name: CI

# Deployment is handled by Vercel's native Git integration (auto-deploys every
# push to `main`). This workflow only validates the code; it does NOT deploy,
# so a flaky test can never block a release.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-e2e:
    name: Build & E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Non-blocking: E2E runs against the live URL and is informational only.
      # It must never gate the build, since deploys are handled by Vercel.
      - name: Run E2E smoke tests
        continue-on-error: true
        run: npm run test:e2e
        env:
          BASE_URL: https://onward-tau.vercel.app
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
